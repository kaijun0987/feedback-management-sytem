services:
  postgres:
    image: postgres:16-alpine
    container_name: soybean-feedback-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: soybean_feedback
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - soybean-feedback-postgres-data:/var/lib/postgresql/data

volumes:
  soybean-feedback-postgres-data:
